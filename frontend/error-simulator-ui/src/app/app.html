<div class="app">
  <h1 class="title">Error Simulator</h1>
  <p class="subtitle">Simulate system failures easily</p>

  <div class="status-line" [style.color]="connectionStatus() === 'connected' ? '#4ade80' : '#f87171'"
    style="font-weight: 600; margin-bottom: 16px;">
    <strong>Status:</strong> {{ statusMessage() }}
  </div>

  <div class="stats">
    <div class="stat">
      <h3>CPU Usage</h3>
      <p>{{ cpu() }} %</p>
    </div>

    <div class="stat">
      <h3>Available RAM</h3>
      <p>{{ ram() }} MB</p>
    </div>
  </div>

  <div class="grid">
    <button class="card cpu" (click)="run('cpu')">
      <p>Spike CPU Usage by 40%</p>
    </button>

    <button class="card memory" (click)="run('memoryStart')">
      <p>Allocate 2GB RAM</p>
    </button>

    <button class="card slow" (click)="run('slow')">
      <p>Slow API</p>
    </button>

    <button class="card db" (click)="run('db')">
      <p>DB Failure</p>
    </button>

    <button class="card exception" (click)="run('exception')">
      <p>Exception</p>
    </button>
  </div>

  <div class="dealloc-section" style="margin-top: 24px;">
    <h2>Deallocation</h2>
    <div class="grid">
      <button class="card release" (click)="run('cpuStop')">
        <p>Release CPU</p>
      </button>

      <button class="card release" (click)="run('memoryStop')">
        <p>Release RAM</p>
      </button>

      <button class="card release" (click)="run('stopAll')">
        <p>Stop All (CPU + RAM)</p>
      </button>

      <button class="card refresh" (click)="refreshStats()">
        <p>Refresh Stats</p>
      </button>
    </div>
  </div>
</div>
