<!-- 📊 STATS (TOP) -->
<div class="stats-container">

  <div class="stat-card">
    <h3>CPU</h3>
    <p class="stat-value">{{ cpu() }}%</p>
  </div>

  <div class="stat-card">
    <h3>Memory</h3>
    <p class="stat-value">{{ ram() }} MB</p>
  </div>

  <div class="stat-card">
    <h3>Status</h3>
<p [class.connected]="connectionStatus() === 'connected' || connectionStatus() === 'demo'"
       [class.disconnected]="connectionStatus() === 'disconnected'"
       [class.demo]="connectionStatus() === 'demo'">
      {{ statusMessage() }}
    </p>
  </div>

</div>


<!-- 🎛️ ACTION PANELS -->
<div class="grid">

  <!-- CPU -->
  <div class="card">
    <h3>🔥 CPU</h3>
    <button class="btn red" (click)="run('cpu')">Start</button>
    <button class="btn yellow" (click)="run('cpuReduce')">Reduce</button>
    <button class="btn green" (click)="run('cpuStop')">Stop</button>
  </div>

  <!-- MEMORY -->
  <div class="card">
    <h3>🧠 Memory</h3>
    <button class="btn blue" (click)="run('memoryStart')">Allocate</button>
    <button class="btn green" (click)="run('memoryStop')">Release</button>
  </div>

  <!-- SLOW -->
  <div class="card">
    <h3>🐢 Latency</h3>
    <button class="btn yellow" (click)="run('slow')">Fixed</button>
    <button class="btn yellow" (click)="run('slowRandom')">Random</button>
  </div>

  <!-- DATABASE -->
  <div class="card">
    <h3>💾 Database</h3>
    <button class="btn red" (click)="run('dbDown')">Down</button>
    <button class="btn yellow" (click)="run('dbTimeout')">Timeout</button>
    <button class="btn blue" (click)="run('dbIntermittent')">Intermittent</button>
    <button class="btn green" (click)="run('dbReset')">Reset</button>
  </div>

  <!-- ERRORS -->
  <div class="card">
    <h3>💥 Errors</h3>
    <button class="btn red" (click)="run('exception')">Exception</button>
    <button class="btn red" (click)="run('stack')">Stack</button>
  </div>

  <!-- GLOBAL -->
  <div class="card">
    <h3>⚙️ Control</h3>
    <button class="btn gray" (click)="run('stopAll')">Stop All</button>
  </div>

</div>
